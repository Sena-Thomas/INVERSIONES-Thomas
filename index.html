<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INVERSIONES Thomas</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }
    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      margin-bottom: 1rem;
      letter-spacing: 2px;
    }
    h1 span {
      color: #e94560;
    }
    p {
      font-size: 1.1rem;
      color: #a8b2d8;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .badge {
      display: inline-block;
      background: #e94560;
      color: #fff;
      padding: 0.4rem 1.2rem;
      border-radius: 999px;
      font-size: 0.85rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>INVERSIONES <span>Thomas</span></h1>
    <p>Plataforma de gestión de inversiones. Próximamente disponible.</p>
    <span class="badge">En construcción</span>
  </div>
</body>
</html>
